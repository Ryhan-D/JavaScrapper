spring:
  application:
    name: panel-empresas-vascas

  datasource:
    url: ${DB_URL}
    username: ${DB_USUARIO}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Europe/Madrid

  jackson:
    time-zone: Europe/Madrid
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-stacktrace: never
    include-message: always

gemini:
  api-key: ${GEMINI_API_KEY}
  modelo: gemini-2.5-flash
  max-caracteres-entrada: 30000

brave:
  api-key: ${BRAVE_API_KEY}
  url-base: https://api.search.brave.com/res/v1/web/search
  timeout-segundos: 10
  resultados-por-busqueda: 10
  pais: ES
  idioma: es

logging:
  level:
    root: INFO
    eus.aaronduque.panelempresas: DEBUG
    org.hibernate.SQL: DEBUG